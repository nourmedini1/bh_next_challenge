version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: insurance_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: insurance_db
    ports:
      - "5433:5433"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d insurance_db"]
      interval: 5s
      retries: 10
      timeout: 5s

volumes:
  pgdata:
